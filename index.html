<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Crick AI — Train Like a Champion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Stripe not needed - Base44 handles payments -->
    <style>
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(60px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-25px); } }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 30px rgba(34, 197, 94, 0.4); } 50% { box-shadow: 0 0 60px rgba(34, 197, 94, 0.8); } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
       
        .fade-in-up { animation: fadeInUp 1.2s ease-out forwards; }
        .float { animation: float 4s ease-in-out infinite; }
        .pulse { animation: pulse 2s ease-in-out infinite; }
        .glow { animation: glow 3s ease-in-out infinite; }
       
        [apple-fade] { opacity: 0.8; transform: translateY(20px); transition: opacity 0.6s ease-out, transform 0.6s ease-out; }
        [apple-fade].visible { opacity: 1; transform: translateY(0); }
       
        .apple-fade {
            opacity: 0.6;
            transform: translateY(80px);
            transition: opacity 1.5s ease-out, transform 1.5s ease-out;
            will-change: opacity, transform;
        }
        .apple-fade.visible {
            opacity: 1;
            transform: translateY(0);
        }
       
        .hover-pop {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .hover-pop:hover {
            transform: scale(1.08) translateY(-5px);
            box-shadow: 0 15px 35px rgba(34, 197, 94, 0.4);
            z-index: 10;
        }
       
        .gradient-text {
          background: linear-gradient(135deg, #10b981 0%, #22c55e 50%, #34d399 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
        }
       
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-strong { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.15); }
        .text-shadow-glow { text-shadow: 0 0 20px rgba(34, 197, 94, 0.5); }
       
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #10b981;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        .video-modal {
          display: none;
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(0, 0, 0, 0.95);
          z-index: 9999;
          justify-content: center;
          align-items: center;
        }
        .video-modal.active { display: flex; }
    </style>
</head>
