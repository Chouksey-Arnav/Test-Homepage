<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>SmartCrick AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════
   RESET & ROOT
════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F7F5; --surface:rgba(255,255,255,0.93);
  --gd:#1D3D32; --gm:#2A5C46; --g:#376B55;
  --gs:#5F9A80; --gmi:#9FC4B0; --gg:#CEE5D8;
  --td:#162B22; --tb:#365549; --ts:#6E9E88; --tf:#A8C8B8;
  --spring:cubic-bezier(0.34,1.56,0.64,1);
  --out:cubic-bezier(0.16,1,0.3,1);
  --in:cubic-bezier(0.4,0,1,1);
}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--td);-webkit-font-smoothing:antialiased;overflow:hidden}
body::after{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.024;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}

/* ════════════════════════════════
   BACKGROUND POOLS
════════════════════════════════ */
.pool{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(110px);will-change:transform}
.p1{width:680px;height:680px;top:-200px;right:-180px;background:radial-gradient(circle,rgba(80,170,120,.11) 0%,transparent 62%);animation:d1 30s ease-in-out infinite}
.p2{width:520px;height:520px;bottom:-140px;left:-140px;background:radial-gradient(circle,rgba(60,140,100,.08) 0%,transparent 62%);animation:d2 36s ease-in-out infinite}
.p3{width:360px;height:360px;top:38%;left:52%;background:radial-gradient(circle,rgba(100,180,140,.07) 0%,transparent 62%);animation:d3 24s ease-in-out infinite}
@keyframes d1{0%,100%{transform:translate(0,0)}35%{transform:translate(24px,-36px)}70%{transform:translate(-18px,22px)}}
@keyframes d2{0%,100%{transform:translate(0,0)}42%{transform:translate(-26px,-20px)}78%{transform:translate(16px,28px)}}
@keyframes d3{0%,100%{transform:translate(-50%,0)}52%{transform:translate(-50%,-18px)}}

/* ════════════════════════════════
   MUTE BUTTON
════════════════════════════════ */
#mute-btn{position:fixed;top:20px;right:20px;z-index:300;width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(160,200,180,.4);background:rgba(255,255,255,.62);backdrop-filter:blur(18px) saturate(1.5);-webkit-backdrop-filter:blur(18px) saturate(1.5);box-shadow:0 2px 18px rgba(30,65,50,.07);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .22s var(--spring),box-shadow .22s var(--out)}
#mute-btn:hover{transform:scale(1.13);box-shadow:0 6px 26px rgba(30,65,50,.12)}
#mute-btn:active{transform:scale(.90)}

/* ════════════════════════════════
   STAGE & SCREEN
════════════════════════════════ */
#stage{position:relative;z-index:10;width:100%;height:100vh;display:flex;align-items:center;justify-content:center;padding:26px 22px 44px;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#stage::-webkit-scrollbar{display:none}
#screen{width:100%;max-width:500px;will-change:opacity,transform}
#screen.s-out{animation:sOut .42s var(--in) forwards}
#screen.s-in {animation:sIn  1.5s var(--out) forwards}
@keyframes sOut{0%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}100%{opacity:0;transform:translateY(-28px) scale(.972);filter:blur(6px)}}
@keyframes sIn {0%{opacity:0;transform:translateY(54px) scale(.974);filter:blur(9px)}25%{filter:blur(0)}100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}

/* ════════════════════════════════
   TIIMO POP-IN
════════════════════════════════ */
.pop{opacity:0;animation:popIn .65s var(--spring) forwards}
.p0{animation-delay:.06s}.p1{animation-delay:.19s}.p2{animation-delay:.32s}
.p3{animation-delay:.46s}.p4{animation-delay:.62s}.p5{animation-delay:.78s}.p6{animation-delay:.94s}
@keyframes popIn{0%{opacity:0;transform:translateY(20px) scale(.86)}55%{opacity:1}100%{opacity:1;transform:translateY(0) scale(1)}}

/* ════════════════════════════════
   LOGO RING
════════════════════════════════ */
.logo-ring{position:relative;display:inline-block;animation:breathe 7s ease-in-out infinite;margin-bottom:20px}
.logo-ring::before{content:'';position:absolute;inset:-12px;border-radius:38px;background:radial-gradient(circle,rgba(80,170,120,.14) 0%,transparent 70%);animation:halo 7s ease-in-out infinite}
.logo-ring img{position:relative;display:block;width:78px;height:78px;border-radius:22px;object-fit:contain;box-shadow:0 16px 44px rgba(29,61,50,.16),0 4px 12px rgba(29,61,50,.09)}
@keyframes breathe{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-5px) scale(1.018)}}
@keyframes halo{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.09)}}

/* ════════════════════════════════
   CTA BUTTON
════════════════════════════════ */
.cta{display:inline-flex;align-items:center;gap:10px;padding:17px 46px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;font-size:1rem;font-weight:700;letter-spacing:.01em;color:#fff;text-decoration:none;background:linear-gradient(135deg,var(--gm) 0%,var(--g) 100%);box-shadow:0 10px 38px rgba(29,61,50,.22),0 3px 9px rgba(29,61,50,.12),inset 0 1px 0 rgba(255,255,255,.14);transition:transform .26s var(--spring),box-shadow .26s var(--out);position:relative;overflow:hidden}
.cta::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,.1) 0%,transparent 50%);pointer-events:none}
.cta:hover{transform:translateY(-3px) scale(1.045);box-shadow:0 18px 50px rgba(29,61,50,.26),0 6px 16px rgba(29,61,50,.14)}
.cta:active{transform:scale(.955)}
.cta:disabled{opacity:.36;cursor:not-allowed;transform:none!important;box-shadow:none}

/* ════════════════════════════════
   WELCOME
════════════════════════════════ */
.welcome{display:flex;flex-direction:column;align-items:center;text-align:center;padding-top:2px}
.w-tag  {font-size:.7rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gs);margin-bottom:11px}
.w-title{font-size:clamp(2.2rem,8.5vw,3.3rem);font-weight:800;line-height:1.07;letter-spacing:-.034em;color:var(--td);margin-bottom:12px}
.w-sub  {font-size:clamp(.88rem,2.4vw,.96rem);font-weight:400;font-style:italic;color:var(--tb);line-height:1.72;max-width:300px;margin-bottom:0;opacity:.84}

.resume-card{width:100%;max-width:370px;margin:18px auto 0;background:rgba(55,107,85,.07);border:1.5px solid rgba(55,107,85,.18);border-radius:18px;padding:16px 20px;text-align:center}
.resume-card p{font-size:.85rem;font-weight:500;color:var(--tb);margin-bottom:13px;line-height:1.5}
.resume-card strong{color:var(--td);font-weight:700}
.resume-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-r{display:inline-flex;align-items:center;gap:7px;padding:11px 24px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;font-size:.87rem;font-weight:700;color:#fff;background:var(--g);box-shadow:0 6px 22px rgba(29,61,50,.2);transition:transform .22s var(--spring),box-shadow .22s}
.btn-r:hover{transform:translateY(-2px) scale(1.04)}
.btn-f{display:inline-flex;align-items:center;gap:6px;padding:11px 16px;border-radius:999px;border:1.5px solid var(--gg);background:transparent;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:600;color:var(--ts);transition:background .2s,color .2s,transform .2s var(--spring)}
.btn-f:hover{background:rgba(160,200,180,.13);color:var(--tb);transform:scale(1.02)}

/* ════════════════════════════════
   SCENE WRAPPER
════════════════════════════════ */
.scene-wrap{width:100%;max-width:500px;margin:16px auto 0;position:relative}
.cscene{width:100%;height:auto;display:block;overflow:visible}

/* ════════════════════════════════
   CRICKET ANIMATION — 8s LOOP
   
   Phases (% of 8s):
   0–30%   Bowler runs in from right
   30–38%  Gather/bound
   38–50%  Load: front arm HIGH, bowling arm back
   50–60%  Delivery: front foot plants, arm over, RELEASE ~55%
   58–66%  Ball pitches + rises to batsman
   64–72%  Batsman FRONT FOOT STRIDE + bat swing + IMPACT ~68%
   68–84%  Ball arcs into sky → SIX!
   84–100% Hold/reset
════════════════════════════════ */

/* ── BOWLER RUN-UP (whole group translates) ── */
.bwl-run{
  animation: bwlRun 8s cubic-bezier(0.4,0,0.2,1) infinite;
}
@keyframes bwlRun{
  0%      { transform:translateX(88px) }
  30%     { transform:translateX(0px); animation-timing-function:ease-out }
  84%     { transform:translateX(0px) }
  85%     { transform:translateX(88px) }
  100%    { transform:translateX(88px) }
}

/* ── BOWLER BODY LEAN (forward during run, upright at delivery) ── */
.bwl-body-lean{
  transform-origin:410px 115px;
  animation:bwlLean 8s ease-in-out infinite;
}
@keyframes bwlLean{
  0%,28%  { transform:rotate(-12deg) }  /* forward lean running */
  36%     { transform:rotate(-6deg)  }  /* slight lean in gather */
  45%,84% { transform:rotate(0deg)   }  /* upright at delivery */
  85%,100%{ transform:rotate(-12deg) }
}

/* ── BOWLER LEG: back leg (far-side, right leg for RH bowler) ── */
.bwl-leg-b{
  transform-origin:410px 115px;
  animation:bwlLegBack 8s ease-in-out infinite;
}
@keyframes bwlLegBack{
  /* RUN-UP stride cycles */
  0%      { transform:rotate(-32deg) }
  4%      { transform:rotate(26deg)  }
  8%      { transform:rotate(-32deg) }
  12%     { transform:rotate(26deg)  }
  16%     { transform:rotate(-32deg) }
  20%     { transform:rotate(26deg)  }
  24%     { transform:rotate(-32deg) }
  28%     { transform:rotate(26deg)  }
  /* Gather */
  32%     { transform:rotate(0deg)   }
  /* Back foot contact — side-on, back foot parallel to crease */
  38%     { transform:rotate(35deg); animation-timing-function:cubic-bezier(0.2,0,0.1,1) }
  /* Delivery stride — back leg drives off */
  52%     { transform:rotate(50deg)  }
  60%,84% { transform:rotate(44deg)  }
  85%,100%{ transform:rotate(-32deg) }
}

/* ── BOWLER LEG: front leg (near-side, left leg for RH bowler) ── */
.bwl-leg-f{
  transform-origin:410px 115px;
  animation:bwlLegFront 8s ease-in-out infinite;
}
@keyframes bwlLegFront{
  0%      { transform:rotate(26deg)  }
  4%      { transform:rotate(-32deg) }
  8%      { transform:rotate(26deg)  }
  12%     { transform:rotate(-32deg) }
  16%     { transform:rotate(26deg)  }
  20%     { transform:rotate(-32deg) }
  24%     { transform:rotate(26deg)  }
  28%     { transform:rotate(-32deg) }
  32%     { transform:rotate(0deg)   }
  38%     { transform:rotate(-34deg) }
  /* Front foot PLANTS (braced/straight knee — critical biomechanical detail) */
  52%     { transform:rotate(-52deg); animation-timing-function:cubic-bezier(0.1,0,0.2,1) }
  56%,84% { transform:rotate(-54deg) }
  85%,100%{ transform:rotate(26deg)  }
}

/* ── BOWLING ARM (full-circle windmill from shoulder) ── */
/* pivot = right shoulder of bowler (~410, 92) */
.bwl-arm-bowl{
  transform-origin:410px 92px;
  animation:bwlArmBowl 8s ease-in-out infinite;
}
@keyframes bwlArmBowl{
  /* run-up: small pump */
  0%      { transform:rotate(15deg);  animation-timing-function:ease-in-out }
  4%      { transform:rotate(-10deg) }
  8%      { transform:rotate(15deg)  }
  12%     { transform:rotate(-10deg) }
  16%     { transform:rotate(15deg)  }
  20%     { transform:rotate(-10deg) }
  24%     { transform:rotate(15deg)  }
  28%     { transform:rotate(-10deg) }
  /* Gather: arm comes up */
  33%     { transform:rotate(-30deg) }
  /* LOAD: arm sweeps BACK AND UP (key position) */
  42%     { transform:rotate(-155deg); animation-timing-function:cubic-bezier(0.05,0,0.05,1) }
  /* EXPLOSION: arm sweeps over the top at high speed */
  56%     { transform:rotate(90deg)  }
  /* Follow-through */
  64%,84% { transform:rotate(140deg) }
  85%,100%{ transform:rotate(15deg)  }
}

/* ── NON-BOWLING (FRONT/GUIDE) ARM — pivots from left shoulder ── */
/* KEY BIOMECHANICAL DETAIL: rises HIGH pointing at sky during load, pulls down at release */
/* pivot = left shoulder of bowler (~400, 92) */
.bwl-arm-guide{
  transform-origin:402px 92px;
  animation:bwlArmGuide 8s ease-in-out infinite;
}
@keyframes bwlArmGuide{
  0%,28%  { transform:rotate(0deg)    } /* neutral during run-up */
  36%     { transform:rotate(-30deg)  } /* rising */
  /* FULLY RAISED: pointing UP AND FORWARD at target — classic fast bowler "gun" position */
  44%     { transform:rotate(-145deg); animation-timing-function:cubic-bezier(0.12,0,0.1,1) }
  48%     { transform:rotate(-148deg) }
  /* PULLS DOWN sharply at front foot contact — generates energy */
  58%     { transform:rotate(30deg)   }
  66%,84% { transform:rotate(45deg)   }
  85%,100%{ transform:rotate(0deg)    }
}

/* ── BATSMAN: FRONT FOOT STRIDE (toward bowler) ── */
/* pivot = left hip of batsman (~108, 100) */
.bat-front-leg{
  transform-origin:108px 100px;
  animation:batFrontLeg 8s ease-in-out infinite;
}
@keyframes batFrontLeg{
  0%,62%   { transform:rotate(0deg)   } /* planted at crease, normal stance */
  /* FRONT FOOT DRIVES DOWN THE PITCH (toward bowler) — key lofted drive technique */
  68%      { transform:rotate(-18deg); animation-timing-function:cubic-bezier(0.2,0,0.1,1) }
  72%,84%  { transform:rotate(-20deg) } /* front foot forward, weight transfers */
  85%,100% { transform:rotate(0deg)   }
}

/* ── BATSMAN: BAT ARM (two-handed grip, full lofted swing) ── */
/* pivot = shoulder junction (~116, 80) */
.bat-arm{
  transform-origin:116px 80px;
  animation:batSwing 8s ease-in-out infinite;
}
@keyframes batSwing{
  0%,60%   { transform:rotate(52deg)  } /* BACK-LIFT: bat raised behind right shoulder */
  /* The moment: bat starts DOWNSWING to meet the ball */
  65%      { transform:rotate(52deg); animation-timing-function:cubic-bezier(0.08,0,0.04,1) }
  /* EXPLOSIVE SWING through the ball — lofted drive arc */
  70%      { transform:rotate(-95deg) }
  /* FULL FOLLOW-THROUGH: arms fully extended, bat finishing HIGH pointing at sky (over bowler) */
  75%,84%  { transform:rotate(-125deg) }
  85%,100% { transform:rotate(52deg)  }
}

/* ── DELIVERY BALL: bowler hand → pitches → rises to bat ── */
/* starts at bowler's release point, translates toward bat */
.ball-delivery{
  animation:ballDelivery 8s ease-in-out infinite;
}
@keyframes ballDelivery{
  0%,52%   { transform:translate(0,0);  opacity:0  }
  54%      { opacity:1 }
  /* travels from release (~410,55) toward pitch (~280,110) */
  59%      { transform:translate(-130px,55px); opacity:1; animation-timing-function:cubic-bezier(0.25,.46,.45,.94) }
  /* rises off pitch toward bat at batsman's end */
  65%      { transform:translate(-284px,20px);  opacity:1  }
  66%      { transform:translate(-286px,20px);  opacity:0  }
  100%     { transform:translate(-286px,20px);  opacity:0  }
}

/* ── FLIGHT BALL: post-impact arc into sky ── */
/* starts at bat contact point (~120,92), arcs UP AND RIGHT (back over bowler) */
.ball-flight{
  animation:ballFlight 8s cubic-bezier(0.2,.9,.35,1) infinite;
}
@keyframes ballFlight{
  0%,68%   { transform:translate(0,0);    opacity:0  }
  69%      { opacity:1 }
  /* straight trajectory — lofted STRAIGHT drive goes over bowler's head */
  74%      { transform:translate(110px,-62px);  opacity:1  }
  79%      { transform:translate(230px,-108px); opacity:1  }
  83%      { transform:translate(340px,-118px); opacity:.9 }
  87%      { transform:translate(420px,-104px); opacity:.6 }
  91%      { transform:translate(470px,-82px);  opacity:.25}
  93%      { transform:translate(488px,-72px);  opacity:0  }
  100%     { transform:translate(488px,-72px);  opacity:0  }
}

/* ── IMPACT FLASH ── */
.impact{
  transform-origin:120px 90px;
  animation:impactFlash 8s ease-in-out infinite;
}
@keyframes impactFlash{
  0%,66%   { opacity:0;transform:scale(.3)  }
  68.5%    { opacity:1;transform:scale(1)   }
  72%      { opacity:0;transform:scale(1.7) }
  100%     { opacity:0 }
}

/* ── TRAIL DOTS (staggered) ── */
.trl{animation:trailOn 8s ease-in-out infinite}
.t1{animation-delay:.07s}.t2{animation-delay:.15s}.t3{animation-delay:.23s}
.t4{animation-delay:.31s}.t5{animation-delay:.39s}.t6{animation-delay:.47s}
@keyframes trailOn{
  0%,71%   { opacity:0 }
  80%      { opacity:.75}
  88%      { opacity:.35}
  93%,100% { opacity:0 }
}

/* ── STUMPS REACT (wobble on near-miss, for liveliness) ── */
.stump-react{animation:stumpWob 8s ease-in-out infinite}
@keyframes stumpWob{
  0%,67%   { transform:none }
  68.5%    { transform:rotate(1.5deg) translateX(1px) }
  70%      { transform:rotate(0deg) }
  100%     { transform:none }
}

/* ── SIX! LABEL ── */
.six{animation:sixPop 8s ease-in-out infinite}
@keyframes sixPop{
  0%,72%   { opacity:0;transform:scale(.4)translateY(8px)  }
  80%      { opacity:1;transform:scale(1)translateY(0)     }
  89%      { opacity:.85 }
  93%,100% { opacity:0;transform:scale(1.08)translateY(-5px) }
}

/* ── GROUND GLOW ── */
.gnd-glow{animation:gndGlw 8s ease-in-out infinite}
@keyframes gndGlw{0%,100%{opacity:.45}66%{opacity:1}}

/* ════════════════════════════════
   FORM SCREENS
════════════════════════════════ */
.scr{display:flex;flex-direction:column;align-items:center;text-align:center}
.scr-q   {font-size:clamp(1.85rem,7.5vw,2.8rem);font-weight:800;line-height:1.1;letter-spacing:-.032em;color:var(--td);margin-bottom:10px}
.scr-sub {font-size:.87rem;font-weight:400;font-style:italic;color:var(--ts);margin-bottom:28px;line-height:1.6}
.fblock  {width:100%;max-width:360px;display:flex;flex-direction:column;gap:13px;margin-bottom:22px}
.fwrap   {width:100%;text-align:left}
.flabel  {display:block;font-size:.64rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gs);margin-bottom:7px;padding-left:3px}
.flabel span{font-weight:500;text-transform:none;letter-spacing:.04em;color:var(--tf);font-size:.64rem}
.finp{width:100%;padding:16px 20px;border-radius:16px;border:2px solid var(--gg);background:rgba(255,255,255,.88);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);font-family:inherit;font-size:.97rem;font-weight:600;color:var(--td);outline:none;box-shadow:0 2px 14px rgba(29,61,50,.04);transition:border-color .26s var(--out),box-shadow .26s var(--out)}
.finp.single{text-align:center;font-size:1.1rem}
.finp::placeholder{color:var(--tf);font-weight:400;font-style:italic}
.finp:focus{border-color:var(--g);box-shadow:0 0 0 4px rgba(55,107,85,.1),0 4px 22px rgba(29,61,50,.08)}
.finp.err{border-color:#D06060;box-shadow:0 0 0 3px rgba(208,96,96,.1)}
.ferr{font-size:.7rem;font-weight:500;color:#B84040;margin-top:5px;padding-left:3px;display:none}
.ferr.show{display:block}

/* QUIZ */
.quiz{display:flex;flex-direction:column}
.pt{width:100%;height:3px;border-radius:999px;background:rgba(160,196,178,.2);overflow:hidden;margin-bottom:9px}
.pf{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gmi),var(--g));transition:width 1.5s var(--out)}
.pr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pc{font-size:.62rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--gs)}
.pn{font-size:.68rem;font-weight:500;color:var(--tf);letter-spacing:.04em}
.ph{font-size:.7rem;font-weight:700;font-style:italic;color:var(--gs);margin-bottom:26px}
.qh{font-size:clamp(1.5rem,5.6vw,2.2rem);font-weight:800;line-height:1.18;letter-spacing:-.024em;color:var(--td);margin-bottom:8px}

      ${has&&qi>0?`
        <div class="resume-card p5 pop">
          <p>Welcome back, <strong>${userName}</strong>! You're on question <strong>${qi+1}&thinsp;/&thinsp;${TOTAL}</strong>. Pick up where you left off?</p>
          <div class="resume-btns">
            <button class="btn-r" id="bc">Continue &nbsp;${AR}</button>

        <div class="p5 pop" style="margin-top:22px">

/* SCREEN 2 — NAME */
function showName(){
  sc.innerHTML=`
    <div class="scr">
      <div class="p0 pop"><div class="logo-ring"><img src="${LOGO}" alt="SmartCrick AI"/></div></div>
      <h2 class="scr-q  p1 pop">What should we<br>call you, Champ?</h2>

          autocomplete="given-name" autocorrect="off" spellcheck="false" maxlength="40"
          value="${userName}"/>
      </div>
      <div class="p4 pop">
        <button class="cta" id="ng" ${userName?"":"disabled"}>Continue &nbsp;${AR}</button>
      </div>
    </div>`;
  const i=document.getElementById("nf"),b=document.getElementById("ng");
  i.addEventListener("input",()=>{b.disabled=i.value.trim().length===0});

  setTimeout(()=>i.focus(),900);
}

/* SCREEN 3 — CONTACT */
function showContact(){
  sc.innerHTML=`
    <div class="scr">
      <div class="p0 pop"><div class="logo-ring"><img src="${LOGO}" alt="SmartCrick AI"/></div></div>
      <h2 class="scr-q  p1 pop">Stay in touch,<br>${userName}.</h2>
      <p  class="scr-sub p2 pop">How should SmartCrick AI reach you?</p>
      <div class="fblock p3 pop">
        <div class="fwrap">
          <label class="flabel" for="fe">Email address <span>· required</span></label>
          <input class="finp" id="fe" type="email" placeholder="you@example.com" value="${userEmail}"
            autocomplete="email" autocorrect="off" spellcheck="false" maxlength="120"/>
          <p class="ferr" id="ee">Please enter a valid email address.</p>
        </div>
        <div class="fwrap">
          <label class="flabel" for="fp">Phone number <span>· optional</span></label>
          <input class="finp" id="fp" type="tel" placeholder="+1 234 567 8900" value="${userPhone}"
            autocomplete="tel" autocorrect="off" spellcheck="false" maxlength="20"/>
        </div>
      </div>
      <div class="p4 pop">
        <button class="cta" id="cg" ${userEmail?"":"disabled"}>Continue &nbsp;${AR}</button>
      </div>
      <div class="p5 pop" style="margin-top:12px">
        <button class="back" id="cbk">${IB} Back</button>
      </div>
    </div>`;
  const ei=document.getElementById("fe"),pi=document.getElementById("fp"),
        bt=document.getElementById("cg"),er=document.getElementById("ee"),
        bk=document.getElementById("cbk");
  const ok=v=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  ei.addEventListener("input",()=>{er.classList.remove("show");ei.classList.remove("err");bt.disabled=ei.value.trim().length===0});
  ei.addEventListener("keydown",e=>{if(e.key==="Enter")pi.focus()});
  pi.addEventListener("keydown",e=>{if(e.key==="Enter"&&!bt.disabled)bt.click()});
  bt.addEventListener("click",()=>{const e=ei.value.trim();if(!ok(e)){ei.classList.add("err");er.classList.add("show");ei.focus();return}userEmail=e;userPhone=pi.value.trim();saveP();goTo(showQuiz)});
  bk.addEventListener("click",()=>{if(!busy)goTo(showName)});
  setTimeout(()=>{if(!userEmail)ei.focus()},900);
}

/* SCREEN 4 — QUIZ */
function showQuiz(){
  const d=Qs[qi],pct=((qi+1)/TOTAL*100).toFixed(2),sel=answers[qi],ctx=CTX[d.cat]||"";
  sc.innerHTML=`
    <div class="quiz">
      <div class="p0 pop">
        <div class="pt"><div class="pf" style="width:${pct}%"></div></div>
        <div class="pr"><span class="pc">${d.cat}</span><span class="pn">${qi+1}&thinsp;/&thinsp;${TOTAL}</span></div>
        <p class="ph">For you, ${userName} ↓</p>
      </div>
      <h2 class="qh p1 pop">${d.q}</h2>
      <p  class="qc p2 pop">${ctx}</p>
      <div class="opts p3 pop">
        ${d.opts.map(o=>`
          <button class="opt${sel===o?" sel":""}" data-txt="${o.replace(/"/g,"&quot;")}">
            <span class="ring">${sel===o?CHK:""}</span>
            <span class="opt-txt">${o}</span>
          </button>`).join("")}
      </div>
      <div class="p4 pop">
        <button class="back" id="bk">${IB} Back</button>
      </div>
    </div>`;
  sc.querySelectorAll(".opt").forEach(btn=>{
    btn.addEventListener("click",()=>{
      if(busy)return;
      const t=btn.dataset.txt;answers[qi]=t;saveP();
      sc.querySelectorAll(".opt").forEach(b=>{const y=b.dataset.txt===t;b.classList.toggle("sel",y);b.querySelector(".ring").innerHTML=y?CHK:"";b.style.pointerEvents="none"});
      document.getElementById("bk").style.pointerEvents="none";
      requestAnimationFrame(()=>requestAnimationFrame(()=>{if(qi<TOTAL-1){qi++;saveP();goTo(showQuiz)}else goTo(showDone)}));
    });
  });
  document.getElementById("bk").addEventListener("click",()=>{if(busy)return;if(qi===0)goTo(showContact);else{qi--;goTo(showQuiz)}});
}

}
